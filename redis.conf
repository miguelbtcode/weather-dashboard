# Configuración básica
bind 0.0.0.0
port 6379
timeout 300
keepalive 60

# Persistencia
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Memoria
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Security (comentado para desarrollo local)
# requirepass your_secure_password

# Performance
tcp-backlog 511
databases 16
